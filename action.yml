name: Pipeline Compose Eval
description: Evaluate pipeline when: expressions against GitHub and context JSON
branding:
  icon: help-circle
  color: purple
inputs:
  expression:
    description: Expression to evaluate
    required: true
  context:
    description: Pipeline context JSON
    required: false
    default: '{}'
  github:
    description: GitHub context JSON subset
    required: false
    default: '{}'
outputs:
  result:
    description: Boolean result as string
runs:
  using: node24
  main: dist/index.js
